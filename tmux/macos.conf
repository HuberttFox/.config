# ==========================================
# Tmux config for macOS
# ==========================================

# Shared interaction defaults.
set -g mouse on
set -s escape-time 0
# Forward terminal focus changes to pane programs such as editors and TUIs.
set -s focus-events on
# Preserve richer key combinations from modern terminals.
set -s extended-keys on
# Exit the tmux server when the last session is gone.
set -sg exit-empty on
# Keep repeatable key bindings responsive without a long timeout window.
set -sg repeat-time 300
# Detach the client cleanly if its target is destroyed.
set -g detach-on-destroy on
# Allow supported escape sequences to pass through tmux when needed.
set -g allow-passthrough on
# Refresh a small set of session-dependent variables when reattaching clients.
set -g update-environment "SSH_AUTH_SOCK DISPLAY DBUS_SESSION_BUS_ADDRESS XDG_RUNTIME_DIR"
# Quietly keep UTF-8 options enabled for compatibility with older configs.
set -q -g status-utf8 on
setw -q -g utf8 on
# Mouse wheel should scroll tmux history in copy mode.
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
# Large enough scrollback for logs without keeping an excessive buffer.
set -g history-limit 10000
# Keep status messages visible briefly without overstaying.
set -g display-time 2000
# Let tmux manage terminal/window titles for the active pane.
set -g set-titles on
# Use tmux's own terminfo entry so applications can detect richer capabilities.
set -g default-terminal "tmux-256color"
# Advertise extended key support for xterm-compatible terminals.
set -as terminal-features 'xterm*:extkeys'

# GNU Screen-style primary prefix, while still accepting the tmux default.
set -g prefix C-a
set -g prefix2 C-b
# Send the literal prefix through to programs when needed.
bind C-a send-prefix

# Start numbering at 1 and keep window names aligned with the current command.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on
# Surface background activity with visible window markers instead of just bells.
set -g visual-activity on
setw -g monitor-activity on
setw -g monitor-bell on

# Reload config in place and keep new splits rooted in the current path.
bind r source-file ~/.tmux.conf \; display-message "config reloaded"
