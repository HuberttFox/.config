bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# Vim-style pane navigation and repeatable resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
# Use Vim-like selection flow inside copy mode.
bind -T copy-mode-vi v send -X begin-selection
# macOS forwards copy-mode selections straight to the system clipboard.
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Minimal status bar with session on the left and time on the right.
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left-length 30
set -g status-left "#[fg=green,bold] #S #[fg=white]| "
set -g status-right-length 100
set -g status-right "#[fg=cyan] %H:%M:%S #[fg=yellow] %Y-%m-%d "
setw -g window-status-current-style "fg=#282c34,bg=#61afef,bold"
setw -g window-status-current-format " #I:#W#F "

# Plugin stack: sane defaults, theme, and session persistence.
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'macchiato'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# TPM loads and manages the plugin list above.
run '~/.tmux/plugins/tpm/tpm'
