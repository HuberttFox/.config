# ==========================================
# Tmux config for Linux
# ==========================================

# Shared interaction defaults.
set -g mouse on
set -s escape-time 0
set -s focus-events on
set -s extended-keys on
set -sg repeat-time 300
bind -T copy-mode-vi WheelUpPane select-pane \; send-keys -X -N 1 scroll-up
bind -T copy-mode-vi WheelDownPane select-pane \; send-keys -X -N 1 scroll-down
set -g history-limit 10000
set -g display-time 2000
set -g default-terminal "screen-256color"
set -as terminal-features 'xterm*:extkeys'

set -g prefix C-a
set -g prefix2 C-b
bind C-a send-prefix

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on

bind r source-file ~/.tmux.conf \; display-message "config reloaded"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
# Linux keeps copy-mode self-contained by copying into tmux's buffer.
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Minimal status bar with session on the left and time on the right.
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=#282c34,fg=#abb2bf"
set -g status-left-length 30
set -g status-left "#[fg=green,bold] #S #[fg=white]| "
set -g status-right-length 100
set -g status-right "#[fg=cyan] %H:%M:%S #[fg=yellow] %Y-%m-%d "
setw -g window-status-current-style "fg=#282c34,bg=#61afef,bold"
setw -g window-status-current-format " #I:#W#F "

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavour 'macchiato'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# TPM loads and manages the plugin list above.
run '~/.tmux/plugins/tpm/tpm'
